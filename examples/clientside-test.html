<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>terlik.js — Client-Side Test</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#232734;--border:#2e3345;
    --text:#e4e6f0;--muted:#8b8fa3;--accent:#6c5ce7;--accent2:#a29bfe;
    --red:#ff6b6b;--green:#66bb6a;--orange:#ffa726;--blue:#42a5f5;
    --yellow:#fdd835;--cyan:#26c6da;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono","Fira Code","JetBrains Mono",Consolas,monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
  body{display:flex;flex-direction:column;overflow:hidden}

  /* ── header ── */
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  header h1{font-size:16px;font-weight:600}
  header h1 span{color:var(--accent2)}
  .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── main ── */
  main{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}

  /* ── panels ── */
  .panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
  .panel:last-child{border-right:none}
  .panel-head{padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
  .panel-body{flex:1;overflow-y:auto;padding:12px 16px}

  /* ── chat messages ── */
  .msg{margin-bottom:12px;max-width:90%;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.user{margin-left:auto;text-align:right}
  .msg.user .bubble{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;display:inline-block;padding:8px 14px;font-size:13px;word-break:break-word}
  .msg.system .bubble{background:var(--surface2);border-radius:14px 14px 14px 4px;display:inline-block;padding:10px 14px;font-size:13px;word-break:break-word;border-left:3px solid var(--green)}
  .msg.system .bubble.profane{border-left-color:var(--red)}
  .msg .meta{font-size:10px;color:var(--muted);margin-top:3px}
  .msg.system .matches{margin-top:6px;font-family:var(--mono);font-size:11px;line-height:1.6}
  .msg.system .match-item{padding:2px 6px;border-radius:4px;background:rgba(255,107,107,.12);color:var(--red);display:inline-block;margin:2px}

  /* ── input area ── */
  .input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .input-row{display:flex;gap:8px}
  .input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
  .input-row input:focus{border-color:var(--accent)}
  .input-row input::placeholder{color:var(--muted)}
  button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:var(--font);transition:background .15s}
  button:hover{background:var(--accent2)}
  button.secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
  button.secondary:hover{border-color:var(--accent)}

  /* ── settings ── */
  .settings{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .field select,.field input[type="number"],.field input[type="text"]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none;font-family:var(--font)}
  .field select:focus,.field input:focus{border-color:var(--accent)}
  .field input[type="checkbox"]{accent-color:var(--accent)}
  .check-row{display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:4px}
  .check-row label{font-size:12px;color:var(--text);text-transform:none;letter-spacing:0}

  /* ── quick tests ── */
  .quick-tests{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .quick-tests button{font-size:11px;padding:4px 10px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
  .quick-tests button:hover{border-color:var(--accent);color:var(--text);background:var(--surface2)}

  /* ── process log ── */
  .log-group{margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden;animation:fadeIn .2s ease}
  .log-header{padding:8px 12px;background:var(--surface2);font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;border-bottom:1px solid var(--border)}
  .log-header .dur{color:var(--cyan)}
  .log-entries{padding:8px 12px}
  .log-entry{font-family:var(--mono);font-size:11px;line-height:1.8;display:flex;gap:8px;align-items:baseline}
  .log-entry .step{color:var(--muted);min-width:22px;text-align:right}
  .log-entry .label{font-weight:600;min-width:100px}
  .log-entry .value{color:var(--text);word-break:break-all}
  .log-entry .time{color:var(--muted);margin-left:auto;white-space:nowrap;font-size:10px}
  .log-entry.norm .label{color:var(--orange)}
  .log-entry.match .label{color:var(--red)}
  .log-entry.result .label{color:var(--green)}
  .log-entry.info .label{color:var(--blue)}
  .log-entry.warn .label{color:var(--yellow)}

  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono)}
  .badge.profane{background:rgba(255,107,107,.15);color:var(--red)}
  .badge.clean{background:rgba(102,187,106,.15);color:var(--green)}

  .empty{color:var(--muted);text-align:center;padding:40px 20px;font-size:13px}

  #log-panel .panel-head .clear-btn{font-size:10px;padding:3px 10px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer}
  #log-panel .panel-head .clear-btn:hover{border-color:var(--red);color:var(--red)}

  /* ── scrollbar ── */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

  /* ── responsive ── */
  @media(max-width:768px){main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
</style>
</head>
<body>

<header>
  <h1><span>terlik.js</span> — Client-Side Test</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Yükleniyor...</span>
  </div>
</header>

<main>
  <!-- LEFT: Chat Panel -->
  <div class="panel" id="chat-panel">
    <div class="panel-head">Chat</div>
    <div class="panel-body" id="messages"></div>

    <div class="settings">
      <div class="settings-grid">
        <div class="field">
          <label>Dil</label>
          <select id="lang">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
          </select>
        </div>
        <div class="field">
          <label>Mod</label>
          <select id="mode">
            <option value="strict">Strict</option>
            <option value="balanced" selected>Balanced</option>
            <option value="loose">Loose</option>
          </select>
        </div>
        <div class="field">
          <label>Mask</label>
          <select id="maskStyle">
            <option value="stars" selected>Stars</option>
            <option value="partial">Partial</option>
            <option value="replace">Replace</option>
          </select>
        </div>
        <div class="field">
          <label>Max Length</label>
          <input type="number" id="maxLength" value="10000" min="1">
        </div>
        <div class="field">
          <div class="check-row">
            <input type="checkbox" id="fuzzy">
            <label for="fuzzy">Fuzzy</label>
          </div>
        </div>
        <div class="field">
          <label>Threshold</label>
          <input type="number" id="fuzzyThreshold" value="0.8" min="0" max="1" step="0.05">
        </div>
      </div>
      <div class="quick-tests" id="quickTests"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="textInput" placeholder="Mesajınızı yazın..." autocomplete="off">
        <button id="sendBtn">Gönder</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Process Log -->
  <div class="panel" id="log-panel">
    <div class="panel-head">
      <span>İşlem Süreci</span>
      <button class="clear-btn" id="clearLog">Temizle</button>
    </div>
    <div class="panel-body" id="logBody">
      <div class="empty">Henüz işlem yapılmadı.<br>Sol panelden mesaj gönderin.</div>
    </div>
  </div>
</main>

<script type="module">
import { Terlik, normalize, createNormalizer, getLanguageConfig, getSupportedLanguages } from "./dist/index.mjs";

// ── State ──
let counter = 0;
const instances = new Map();

const quickTestsByLang = {
  tr: [
    ["temiz mesaj", "merhaba dünya, nasılsın?"],
    ["düz küfür", "siktir git buradan"],
    ["leet speak", "$1kt1r g0t_v3r3n"],
    ["ayraçlı", "s.i.k.t.i.r lan"],
    ["boşluklu", "o r o s p u çocuğu"],
    ["tekrarlı", "siiiiiktir pu$ttt"],
    ["suffix", "siktiler orospuluk aptallarin"],
    ["karışık", "s2mle yüzle$ g0t_v3r3n pezev3nk"],
    ["whitelist", "Amsterdam sikke bokser memur"],
    ["zero-width", "s\u200Bi\u200Bk\u200Bt\u200Bi\u200Br"],
  ],
  en: [
    ["clean", "hello world, how are you?"],
    ["plain", "what the fuck is this"],
    ["leet", "fuk th1s sh1t"],
    ["spaced", "f u c k you"],
    ["suffix", "motherfucking asshole"],
    ["whitelist", "class grasshopper assassin"],
  ],
  es: [
    ["limpio", "hola mundo, todo bien"],
    ["directo", "hijo de puta maldito"],
    ["variantes", "put4 cabr0n"],
    ["whitelist", "documento puntual"],
  ],
  de: [
    ["sauber", "hallo welt, alles gut"],
    ["direkt", "verdammte scheiße arschloch"],
    ["leet", "sch31sse f1ck"],
    ["whitelist", "Kunstwerk Dichter"],
  ],
};

// ── DOM ──
const $messages = document.getElementById("messages");
const $logBody = document.getElementById("logBody");
const $textInput = document.getElementById("textInput");
const $sendBtn = document.getElementById("sendBtn");
const $clearLog = document.getElementById("clearLog");
const $lang = document.getElementById("lang");
const $mode = document.getElementById("mode");
const $maskStyle = document.getElementById("maskStyle");
const $maxLength = document.getElementById("maxLength");
const $fuzzy = document.getElementById("fuzzy");
const $fuzzyThreshold = document.getElementById("fuzzyThreshold");
const $quickTests = document.getElementById("quickTests");
const $statusDot = document.getElementById("statusDot");
const $statusText = document.getElementById("statusText");

// ── Instance management ──
function getCacheKey() {
  return `${$lang.value}|${$mode.value}|${$maskStyle.value}|${$fuzzy.checked}|${$fuzzyThreshold.value}|${$maxLength.value}`;
}

function getInstance() {
  const key = getCacheKey();
  if (!instances.has(key)) {
    instances.set(key, new Terlik({
      language: $lang.value,
      mode: $mode.value,
      maskStyle: $maskStyle.value,
      enableFuzzy: $fuzzy.checked,
      fuzzyThreshold: parseFloat($fuzzyThreshold.value),
      maxLength: parseInt($maxLength.value),
    }));
  }
  return instances.get(key);
}

// ── Quick tests ──
function renderQuickTests() {
  const tests = quickTestsByLang[$lang.value] || [];
  $quickTests.innerHTML = "";
  for (const [label, text] of tests) {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.title = text;
    btn.addEventListener("click", () => { $textInput.value = text; analyze(); });
    $quickTests.appendChild(btn);
  }
}

// ── Analyze ──
function analyze() {
  const text = $textInput.value.trim();
  if (!text) return;
  $textInput.value = "";
  counter++;

  // User bubble
  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerHTML = `<div class="bubble">${esc(text)}</div><div class="meta">#${counter}</div>`;
  $messages.appendChild(userMsg);

  // Process
  const steps = [];
  const t0 = performance.now();

  // Step 1: Get normalizer for logging
  const langConfig = getLanguageConfig($lang.value);
  const normalizeFn = createNormalizer({
    locale: langConfig.locale,
    charMap: langConfig.charMap,
    leetMap: langConfig.leetMap,
    numberExpansions: langConfig.numberExpansions,
  });

  const s1 = performance.now();
  const normalized = normalizeFn(text);
  const s1e = performance.now();
  steps.push({ type: "norm", label: "Normalize", value: `"${text}" → "${normalized}"`, time: s1e - s1 });

  // Step 2: Get / create instance
  const s2 = performance.now();
  const terlik = getInstance();
  const s2e = performance.now();
  steps.push({ type: "info", label: "Instance", value: `lang=${$lang.value} mode=${$mode.value} fuzzy=${$fuzzy.checked}`, time: s2e - s2 });

  // Step 3: getMatches
  const s3 = performance.now();
  const matches = terlik.getMatches(text);
  const s3e = performance.now();
  steps.push({ type: matches.length > 0 ? "match" : "result", label: "Detect", value: `${matches.length} match(es)`, time: s3e - s3 });

  // Step 4: Log each match
  for (const m of matches) {
    steps.push({ type: "match", label: "Match", value: `word="${m.word}" root="${m.root}" sev=${m.severity} method=${m.method} @${m.index}` });
  }

  // Step 5: Clean
  const s5 = performance.now();
  const cleaned = terlik.clean(text);
  const s5e = performance.now();
  steps.push({ type: "result", label: "Clean", value: `"${cleaned}"`, time: s5e - s5 });

  const totalMs = performance.now() - t0;
  steps.push({ type: "info", label: "Total", value: `${totalMs.toFixed(2)}ms` });

  // System response bubble
  const sysMsg = document.createElement("div");
  sysMsg.className = "msg system";
  const isProfane = matches.length > 0;
  let matchHtml = "";
  if (isProfane) {
    matchHtml = `<div class="matches">${matches.map(m => `<span class="match-item">${esc(m.word)} → ${esc(m.root)} (${m.severity})</span>`).join(" ")}</div>`;
  }
  sysMsg.innerHTML = `
    <div class="bubble ${isProfane ? "profane" : ""}">
      <span class="badge ${isProfane ? "profane" : "clean"}">${isProfane ? "PROFANITY" : "CLEAN"}</span>
      &nbsp;${esc(cleaned)}
      ${matchHtml}
    </div>
    <div class="meta">${totalMs.toFixed(2)}ms · ${matches.length} match · ${$mode.value}</div>
  `;
  $messages.appendChild(sysMsg);
  $messages.scrollTop = $messages.scrollHeight;

  // Log group
  addLogGroup(counter, totalMs, steps);
}

function addLogGroup(n, totalMs, steps) {
  // Remove empty state
  const empty = $logBody.querySelector(".empty");
  if (empty) empty.remove();

  const group = document.createElement("div");
  group.className = "log-group";

  const now = new Date().toLocaleTimeString("tr-TR");
  group.innerHTML = `
    <div class="log-header">
      <span>#${n} — ${now}</span>
      <span class="dur">${totalMs.toFixed(2)}ms</span>
    </div>
    <div class="log-entries">
      ${steps.map((s, i) => `
        <div class="log-entry ${s.type}">
          <span class="step">${i + 1}</span>
          <span class="label">${s.label}</span>
          <span class="value">${esc(s.value)}</span>
          ${s.time != null ? `<span class="time">${s.time.toFixed(2)}ms</span>` : ""}
        </div>
      `).join("")}
    </div>
  `;
  $logBody.appendChild(group);
  $logBody.scrollTop = $logBody.scrollHeight;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ── Events ──
$sendBtn.addEventListener("click", analyze);
$textInput.addEventListener("keydown", (e) => { if (e.key === "Enter") analyze(); });
$clearLog.addEventListener("click", () => { $logBody.innerHTML = '<div class="empty">Log temizlendi.</div>'; });
$lang.addEventListener("change", renderQuickTests);

// ── Init: warmup ──
const initStart = performance.now();
const langs = getSupportedLanguages();
for (const lang of langs) {
  const t = new Terlik({ language: lang });
  t.containsProfanity("warmup");
}
const initMs = performance.now() - initStart;

$statusDot.style.background = "var(--green)";
$statusText.textContent = `Hazır · ${langs.length} dil · warmup ${initMs.toFixed(0)}ms`;
renderQuickTests();
$textInput.focus();
</script>
</body>
</html>
